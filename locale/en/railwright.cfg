loader-tooltip=Select a loader-1x1 prototype. Deadlock loader tiers normally match their transport-belt tier.
locomotives-tooltip=Number of forward locomotives. For stations, double-headed adds the same number at the rear.
wagons-tooltip=Number of cargo or fluid wagons. For stackers, this determines the required holding length.
double-headed-tooltip=Add rear-facing locomotives to station blueprints. Stackers use train length only and hide this option.
include-train-tooltip=Place rolling stock in the generated station blueprint.
madzuri-tooltip=Wire chests and inserters for balanced loading or unloading across the train.
train-limit-tooltip=Use a fixed train limit, disable it, or calculate it dynamically from connected storage capacity.
stacker-lanes-tooltip=Number of parallel holding lanes in the generated stacker.
stacker-diagonal-tooltip=Use Factorio's native rail planner to construct experimental diagonal holding lanes.

[mod-setting-name]
railwright-enable-experimental-diagonal=Show experimental diagonal stacker option

[mod-setting-description]
railwright-enable-experimental-diagonal=Shows the experimental diagonal stacker checkbox in the Railwright stacker configuration. Enabled by default; disable this setting to hide diagonal generation.
