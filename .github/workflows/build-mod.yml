name: Build Railwright Mod

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Lua syntax checker
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Validate Lua syntax
        shell: bash
        run: |
          find . -type f -name '*.lua' \
            -not -path './.git/*' \
            -print0 | while IFS= read -r -d '' file; do
              echo "Checking ${file}"
              luac5.4 -p "${file}"
            done

      - name: Read mod metadata
        id: metadata
        shell: bash
        run: |
          MOD_NAME="$(python -c 'import json; print(json.load(open("info.json", encoding="utf-8"))["name"])')"
          VERSION="$(python -c 'import json; print(json.load(open("info.json", encoding="utf-8"))["version"])')"
          ARCHIVE="dist/${MOD_NAME}_${VERSION}.zip"

          echo "mod_name=${MOD_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "package_name=${MOD_NAME}_${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate required PNG assets
        run: |
          python tools/validate_png.py \
            thumbnail.png \
            graphics/railwright-shortcut-x56.png

      - name: Build Factorio mod ZIP
        run: python tools/package_mod.py

      - name: Generate release notes from changelog
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          python tools/release_notes.py "${VERSION}" > dist/release-notes.md
          cat dist/release-notes.md

      - name: Verify package contents
        shell: bash
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          from tools.validate_png import PngValidationError, validate_png_bytes

          archive = Path("${{ steps.metadata.outputs.archive }}")
          expected_root = "${{ steps.metadata.outputs.package_name }}/"

          if not archive.is_file():
              raise SystemExit(f"Missing package: {archive}")

          with zipfile.ZipFile(archive) as zf:
              names = zf.namelist()
              if not names:
                  raise SystemExit("Package is empty")
              if any(not name.startswith(expected_root) for name in names):
                  raise SystemExit(f"Every file must be inside {expected_root}")
              if f"{expected_root}info.json" not in names:
                  raise SystemExit("Package does not contain info.json at the mod root")
              if f"{expected_root}changelog.txt" not in names:
                  raise SystemExit("Package does not contain changelog.txt at the mod root")

              thumbnail = f"{expected_root}thumbnail.png"
              shortcut = f"{expected_root}graphics/railwright-shortcut-x56.png"

              if thumbnail not in names:
                  raise SystemExit("Package does not contain lowercase thumbnail.png at the mod root")
              if shortcut not in names:
                  raise SystemExit("Package does not contain the Railwright 56px shortcut icon")

              try:
                  thumbnail_size = validate_png_bytes(zf.read(thumbnail), thumbnail)
                  shortcut_size = validate_png_bytes(zf.read(shortcut), shortcut)
              except PngValidationError as exc:
                  raise SystemExit(str(exc)) from exc

              if shortcut_size != (56, 56):
                  raise SystemExit(
                      f"Packaged shortcut icon must be exactly 56x56 pixels, got {shortcut_size[0]}x{shortcut_size[1]}"
                  )

              print(f"Validated packaged thumbnail.png: {thumbnail_size[0]}x{thumbnail_size[1]}")
              print("Validated packaged shortcut icon: 56x56")

          print(f"Verified {archive} with {len(names)} files")
          PY

      - name: Upload packaged mod artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.metadata.outputs.archive }}
          if-no-files-found: error
          archive: false

      - name: Prepare main release tag
        id: release
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
            if [ "${TAG_COMMIT}" = "${GITHUB_SHA}" ]; then
              echo "Tag ${TAG} already points at this main commit; release steps may be safely re-run."
              echo "publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "Tag ${TAG} already exists at ${TAG_COMMIT}. Current main is ${GITHUB_SHA}."
              echo "This build will not move or overwrite an existing release tag."
              echo "publish=false" >> "$GITHUB_OUTPUT"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" "${GITHUB_SHA}" -m "Railwright ${VERSION}"
            git push origin "refs/tags/${TAG}"
            echo "Created ${TAG} from main commit ${GITHUB_SHA}."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
          VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_NOTES: dist/release-notes.md
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Railwright ${VERSION}" \
              --notes-file "${RELEASE_NOTES}"
            gh release upload "${RELEASE_TAG}" "${ARCHIVE}" --clobber
          else
            gh release create "${RELEASE_TAG}" \
              "${ARCHIVE}" \
              --title "Railwright ${VERSION}" \
              --notes-file "${RELEASE_NOTES}"
          fi

      - name: Check Factorio Mod Portal release
        id: portal
        if: steps.release.outputs.publish == 'true'
        env:
          MOD_NAME: ${{ steps.metadata.outputs.mod_name }}
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.error
          import urllib.request

          mod_name = os.environ["MOD_NAME"]
          version = os.environ["VERSION"]
          url = f"https://mods.factorio.com/api/mods/{mod_name}"

          try:
              with urllib.request.urlopen(url) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("version_exists=false")
                  raise SystemExit(0)
              raise

          versions = {release.get("version") for release in payload.get("releases", [])}
          print(f"version_exists={'true' if version in versions else 'false'}")
          PY

      - name: Upload release to Factorio Mod Portal
        if: steps.release.outputs.publish == 'true' && steps.portal.outputs.version_exists != 'true'
        env:
          FACTORIO_API_KEY: ${{ secrets.FACTORIO_API_KEY }}
          MOD_NAME: ${{ steps.metadata.outputs.mod_name }}
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FACTORIO_API_KEY:-}" ]; then
            echo "::error::Repository secret FACTORIO_API_KEY is not configured."
            exit 1
          fi

          echo "Requesting a Mod Portal upload URL for ${MOD_NAME}..."
          INIT_RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${FACTORIO_API_KEY}" \
            --form "mod=${MOD_NAME}" \
            "https://mods.factorio.com/api/v2/mods/releases/init_upload")"

          UPLOAD_URL="$(INIT_RESPONSE="${INIT_RESPONSE}" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["INIT_RESPONSE"])
          upload_url = payload.get("upload_url")
          if not upload_url:
              raise SystemExit(f"Mod Portal did not return an upload_url: {payload}")
          print(upload_url)
          PY
          )"

          echo "Uploading ${ARCHIVE} to the Factorio Mod Portal..."
          UPLOAD_RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${FACTORIO_API_KEY}" \
            --form "file=@${ARCHIVE}" \
            "${UPLOAD_URL}")"

          UPLOAD_RESPONSE="${UPLOAD_RESPONSE}" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["UPLOAD_RESPONSE"])
          if payload.get("success") is not True:
              raise SystemExit(f"Mod Portal upload failed: {payload}")

          print(payload.get("message") or "Factorio Mod Portal upload completed successfully.")
          PY
